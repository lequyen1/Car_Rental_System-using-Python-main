<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Edit Profile</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#2c4a86,#4b6cb7);
}

.container{
    width:420px;
    margin:60px auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    border-color:#4b6cb7;
    outline:none;
    box-shadow:0 0 5px rgba(75,108,183,0.5);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#28a745;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#218838;
}

.back{
    text-align:center;
    margin-top:15px;
}

.back a{
    text-decoration:none;
    color:#4b6cb7;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h2>Edit Profile</h2>

<form method="POST">

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="full_name" value="{{ user.full_name or '' }}" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ user.email or '' }}" required>
    </div>

    <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ user.phone or '' }}">
    </div>

    <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" value="{{ user.address or '' }}">
    </div>

    <button type="submit">Save Changes</button>

</form>

<div class="back">
    <a href="/profile">← Back to Profile</a>
</div>

</div>

</body>
</html>
