<!DOCTYPE html>
<html>
<head>
    <title>Rental History</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .completed {
            color: green;
            font-weight: bold;
        }

        img {
            width: 200px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Rental History</h2>

    <a href="{{ url_for('profile') }}"
       style="display:inline-block; margin-bottom:20px; text-decoration:none; background:#333; color:white; padding:6px 12px; border-radius:5px;">
       ← Back
    </a>

    {% for rent in history %}
    <div class="card">
        <h3>{{ rent.name }}</h3>

        {% if rent.image %}
            <img src="{{ rent.image }}">
        {% endif %}

        <p>Start date: {{ rent.start_date }}</p>
        <p>End date: {{ rent.end_date }}</p>
        <p>Total price: {{ rent.total_price }} VND</p>
        <p>Status: <span class="completed">Completed</span></p>

        <br>

        <a href="{{ url_for('rent_again', car_id=rent.car_id) }}"
           style="background:green; color:white; padding:6px 12px;
                  text-decoration:none; border-radius:5px; display:inline-block;">
           Rent Again
        </a>
    </div>
{% else %}
    <p>You have not rented any cars.</p>
{% endfor %}
</div>

</body>
</html>
